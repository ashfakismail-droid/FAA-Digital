<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — LUXORA</title>
  <link rel="icon" href="../images/misc/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm" novalidate>
      <div class="brand">
        <img src="../images/misc/logo.svg" alt="LUXORA" width="40" height="40">
        <span class="brand-name">LUXORA</span>
      </div>
      <h2>Admin Access</h2>
      <p class="sub">Sign in to the control panel</p>
      <div class="field"><label>Username</label><input name="user" value="admin" autocomplete="username"><div class="error-msg">Required.</div></div>
      <div class="field"><label>Password</label><input name="pass" type="password" placeholder="••••••••" autocomplete="current-password"><div class="error-msg">Incorrect credentials.</div></div>
      <button type="submit" class="btn btn-gold btn-block">Sign In</button>
      <div class="login-hint">Demo credentials — <strong>admin</strong> / <strong>luxora2026</strong></div>
      <div style="text-align:center;margin-top:14px"><a href="../index.html" class="muted" style="font-size:13px">← Back to Store</a></div>
    </form>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/currency.js"></script>
  <script src="js/admin.js"></script>
  <script>
    if (window.LUXORA_ADMIN && window.LUXORA_ADMIN.isLoggedIn()) location.href = 'dashboard.html';
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var u = this.elements['user'].value.trim();
      var p = this.elements['pass'].value;
      if (window.LUXORA_ADMIN.login(u, p)) location.href = 'dashboard.html';
      else { this.querySelector('.field:last-child').classList.add('invalid'); window.LUXORA_ADMIN.toast('Invalid username or password', 'error'); }
    });
  </script>
</body>
</html>
