<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Aurora Grand Resort</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div data-header></div>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb">HOME / GALLERY</div>
      <h1>Gallery</h1>
      <p>A visual journey through the spaces and moments of Aurora.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="filter-tabs" id="gallery-filters"></div>
      <div class="masonry" id="gallery-grid"></div>
    </div>
  </section>

  <div data-footer></div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" aria-label="Close">×</button>
    <button class="lb-nav lb-prev" aria-label="Previous">‹</button>
    <img src="" alt="" />
    <button class="lb-nav lb-next" aria-label="Next">›</button>
  </div>

  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
