<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — Aurora Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin">
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar" id="topbar"></header>
      <main class="content">
        <div class="table-wrap">
          <div class="table-toolbar">
            <div class="search">
              <span class="s-ico">🔍</span>
              <input type="text" id="user-search" placeholder="Search users…" />
            </div>
            <select id="user-filter" style="max-width:180px;">
              <option value="all">All Roles</option>
              <option>Super Admin</option><option>Manager</option>
              <option>Reception</option><option>Restaurant</option>
            </select>
            <button class="btn btn-gold btn-sm" id="add-user-btn">+ Add User</button>
          </div>
          <table class="data">
            <thead>
              <tr>
                <th>User</th>
                <th data-sort="role">Role</th>
                <th>Email</th>
                <th data-sort="status">Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="user-tbody"></tbody>
          </table>
          <div class="pagination" id="user-pagination"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- User modal -->
  <div class="modal-overlay" id="user-modal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="user-modal-title">Add User</h3>
        <button class="modal-close" data-close-modal="user-modal">×</button>
      </div>
      <div class="modal-body">
        <form id="user-form" novalidate>
          <input type="hidden" name="id" />
          <div class="form-group">
            <label>Full Name</label>
            <input name="name" required /><div class="field-error">Required.</div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input name="email" type="email" required /><div class="field-error">Valid email required.</div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Role</label>
              <select name="role">
                <option>Super Admin</option><option>Manager</option>
                <option>Reception</option><option>Restaurant</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-gold btn-block">Save User</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/store.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../js/ui.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/users-admin.js"></script>
</body>
</html>
