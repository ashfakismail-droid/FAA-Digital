<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Vehicles — Prestige Motors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" href="assets/img/brands/prestige.svg">
</head>
<body data-page="compare" data-nav="solid">
  <header id="site-nav"></header>
  <section class="page-head">
    <div class="container">
      <div class="breadcrumb" style="color:rgba(255,255,255,.6)"><a href="index.html" style="color:rgba(255,255,255,.6)">Home</a><span>/</span><span>Compare</span></div>
      <h1>Compare Vehicles</h1>
      <p>Select up to three vehicles to see their specifications side by side. Differences are highlighted.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div id="compareEmpty" class="compare-empty">
        <div style="font-size:3rem;margin-bottom:12px">⇄</div>
        <p>You haven't added any vehicles to compare yet.</p>
        <a class="btn btn--gold" href="inventory.html">Browse Inventory</a>
      </div>
      <div id="compareWrap" class="hidden">
        <div style="overflow-x:auto">
          <table class="compare-table" id="compareTable"></table>
        </div>
        <div class="text-center" style="margin-top:24px">
          <button class="btn btn--outline" id="clearCompare">Clear All</button>
        </div>
      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>
  <script src="assets/data/vehicles.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/compare.js"></script>
</body>
</html>
