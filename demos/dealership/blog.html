<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Prestige Motors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" href="assets/img/brands/prestige.svg">
</head>
<body data-page="blog" data-nav="solid">
  <header id="site-nav"></header>
  <section class="page-head">
    <div class="container">
      <div class="breadcrumb" style="color:rgba(255,255,255,.6)"><a href="index.html" style="color:rgba(255,255,255,.6)">Home</a><span>/</span><span>Blog</span></div>
      <h1>The Prestige Journal</h1>
      <p>Insight, guides, and stories from the world of luxury and performance motoring.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="toolbar">
        <div class="flex wrap" style="gap:10px" id="catFilters"></div>
        <input type="search" id="blogSearch" placeholder="Search articles…" style="padding:11px 16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);color:var(--text);min-width:220px">
      </div>
      <div class="grid grid-3" id="blogGrid"></div>
      <div id="blogEmpty" class="compare-empty hidden">No articles found.</div>
    </div>
  </section>

  <footer id="site-footer"></footer>
  <script src="assets/data/blog.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/blog.js"></script>
</body>
</html>
